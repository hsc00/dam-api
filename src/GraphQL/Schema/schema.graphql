"""
Minimal upload contract for the DAM API.
"""
schema {
  query: Query
  mutation: Mutation
  """
  Search assets for the authenticated account by file name and return a SearchAssetsPayload.
  `page` is one-based and values lower than `1` are clamped to `1`.
  `pageSize` is clamped to the current server range of `1..50`.
  Empty or whitespace-only `query` values return a SearchAssetsPayload with an empty `files` list and a `userErrors` entry instead of matching all assets.
  """
"""
enum AssetStatus {
  "The upload has started but is not complete."
  PENDING

  UPLOADED

  "The upload failed."
  FAILED
}

"""
Where the returned asset status was read from.
"""
enum AssetReadSource {
  FAST_CACHE
  DURABLE_STORE
}

"""
Supported HTTP method for the upload request in v1.
"""
enum UploadHttpMethod {
  PUT
}

"""
Where the client reads the completion proof from in v1.
"""
enum UploadCompletionProofSource {
  RESPONSE_HEADER
}

"""
One required name/value pair for an upload request.
"""
type UploadParameter {
  "Parameter name."
  name: String!

  "Parameter value."
  value: String!
}

"""
Minimal tracked asset resource.
"""
type Asset {
  "Asset identifier."
  id: ID!

  "Current upload status."
  status: AssetStatus!
}

"""
Asset status view returned by the asset query, including read provenance.
"""
type AssetStatusSnapshot {
  "Asset identifier."
  id: ID!

  "Current upload status."
  status: AssetStatus!

  "Source used to read the returned asset status."
  readSource: AssetReadSource!
}

"""
How the client identifies the upload proof required by completeUpload.
"""
type UploadCompletionProofDescriptor {
  "Proof name the client must read from the upload response."
  name: String!

  "Where the client must read that proof in the upload response."
  source: UploadCompletionProofSource!
}

"""
Full client request instructions for uploading one file.

Specifies the HTTP upload contract details required for browser-side file uploads.

When `uploadTarget.url` is a cross-origin endpoint, the server hosting that endpoint
must be configured to allow this upload origin via CORS:

- **Access-Control-Allow-Headers**: Must include all header names listed in `signedHeaders`
  to permit the browser to send signed authentication headers during the preflight request.

- **Access-Control-Expose-Headers**: Must include the header name specified in
  `completionProof` so the browser client can read the completion proof from the response.

- **Access-Control-Allow-Origin** and **credentials**: Must explicitly allow the requesting
  origin and set `Access-Control-Allow-Credentials: true` if the upload uses credentials.

Without proper CORS configuration, the browser will block the signed headers from being sent
and will prevent access to the completionProof response header, causing the upload flow to fail.

For same-origin uploads, these CORS requirements do not apply.
"""
type UploadTarget {
  "Time-limited upload URL."
  url: String!

  "HTTP method the client must use for the upload request."
  method: UploadHttpMethod!

  "Authorization-critical headers that must be sent exactly as issued."
  signedHeaders: [UploadParameter!]!

  "Descriptor for the upload proof the client must capture and echo to completeUpload."
  completionProof: UploadCompletionProofDescriptor!

  "When this upload target expires."
  expiresAt: DateTime!
}

"""
A business validation error.
"""
type UserError {
  "Machine-readable error code."
  code: String!

  "Human-readable error message."
  message: String!

  "Related input field, when applicable."
  field: String
}

"""
Input for starting one upload.
"""
input StartUploadInput {
  "Original client file name."
  fileName: String

  "Client-supplied media type."
  mimeType: String

  "Declared file size in bytes."
  fileSizeBytes: ByteCount

  "Base64-encoded SHA-256 checksum of the file content."
  checksumSha256: String
}

"""
One file within a chunk-aware upload batch.
"""
input StartUploadBatchFileInput {
  "Client-supplied correlation identifier for this file."
  clientFileId: String

  "Original client file name."
  fileName: String

  "Client-supplied media type."
  mimeType: String

  "Number of upload chunks the client will send for this file."
  chunkCount: Int
}

"""
Input for starting multiple uploads at once.
"""
input StartUploadBatchInput {
  "Files to initiate in this batch."
  files: [StartUploadBatchFileInput!]
}

"""
Successful result of startUpload.
"""
type StartUploadSuccess {
  "Created asset status."
  asset: Asset!

  "Upload target for the started upload."
  uploadTarget: UploadTarget!

  "Server-issued grant required to complete this upload."
  uploadGrant: String!
}

"""
Payload for startUpload.
"""
type StartUploadPayload {
  "Successful result when the operation completes without business errors."
  success: StartUploadSuccess

  "Business validation errors."
  userErrors: [UserError!]!
}

"""
Successful result for one file in startUploadBatch.
"""
type StartUploadBatchFileSuccess {
  "Created asset status."
  asset: Asset!

  "Upload targets for each declared chunk."
  uploadTargets: [UploadTarget!]!

  "Server-issued grant required to complete this upload later."
  uploadGrant: String!
}

"""
Per-file result returned by startUploadBatch.
"""
type StartUploadBatchFilePayload {
  "Client correlation identifier echoed from the request."
  clientFileId: String!

  "Successful result when this file is accepted."
  success: StartUploadBatchFileSuccess

  "Business validation errors for this file."
  userErrors: [UserError!]!
}

"""
Payload for startUploadBatch.
"""
type StartUploadBatchPayload {
  "Per-file outcomes in request order."
  files: [StartUploadBatchFilePayload!]!

  "Business validation errors that apply to the whole batch."
  userErrors: [UserError!]!
}

"""
Input for completing one upload.
"""
input CompleteUploadInput {
  "Asset identifier returned by startUpload."
  assetId: ID

  "Server-issued grant returned by startUpload."
  uploadGrant: String

  "Captured upload proof value named by uploadTarget.completionProof."
  completionProof: String
}

"""
Successful result of completeUpload.
"""
type CompleteUploadSuccess {
  "Updated asset status."
  asset: Asset!
}

"""
Payload for completeUpload.
"""
type CompleteUploadPayload {
  "Successful result when the operation completes without business errors."
  success: CompleteUploadSuccess

  "Business validation errors."
  userErrors: [UserError!]!
}

"""
One searchable asset returned by `searchAssets`.

Results are limited to assets with status `UPLOADED` (see `AssetStatus` and
the `status` field below). The `status` field still reflects the current
upload status for the returned asset.
"""
type SearchAssetsFile {
  "Asset identifier."
  id: ID!

  "Original client file name."
  fileName: String!

  "Client-supplied media type."
  mimeType: String!

  "Current upload status."
  status: AssetStatus!
}

"""
Pagination metadata returned by searchAssets.
"""
type SearchAssetsPageInfo {
  "Current one-based page number."
  page: Int!

  "Effective page size after server-side validation/clamping (capped at MAX_PAGE_SIZE)."
  pageSize: Int!

  "Total number of pages for this result set."
  totalPages: Int!
}

"""
Payload for searchAssets.
"""
type SearchAssetsPayload {
  "Matching assets for the authenticated account."
  files: [SearchAssetsFile!]!

  "Total number of assets with status UPLOADED that matched before pagination."
  totalCount: Int!

  "Pagination metadata for this search result."
  pageInfo: SearchAssetsPageInfo!

  "Business validation errors."
  userErrors: [UserError!]!
}

type Query {
  "Fetch the status of one asset by id."
  asset(id: ID!): AssetStatusSnapshot

  """
  Search assets for the authenticated account by file name and return a SearchAssetsPayload.
  `page` is one-based and values lower than `1` are clamped to `1`.
  `pageSize` is clamped to the current server range of `1..50`.
  Empty or whitespace-only `query` values return a SearchAssetsPayload with an empty `files` list and a `userErrors` entry instead of matching all assets.
  """
  searchAssets(
    query: String!
    page: Int = 1
    pageSize: Int = 10
  ): SearchAssetsPayload!
}

type Mutation {
  "Start one upload and receive its upload target."
  startUpload(input: StartUploadInput!): StartUploadPayload!

  "Start multiple uploads and receive one upload target per chunk for each accepted file."
  startUploadBatch(input: StartUploadBatchInput!): StartUploadBatchPayload!

  "Complete one upload after the file is sent and move it into processing."
  completeUpload(input: CompleteUploadInput!): CompleteUploadPayload!
}
