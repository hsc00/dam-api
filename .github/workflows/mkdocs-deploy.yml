name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - requirements.txt

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requirements
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Capture README checksum
        run: echo "README_SHA256=$(sha256sum README.md | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Build MkDocs site
        run: mkdocs build

      - name: Verify README unchanged
        run: |
          current_sha="$(sha256sum README.md | awk '{print $1}')"
          [ "$current_sha" = "$README_SHA256" ]

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
