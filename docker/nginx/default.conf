server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    index index.php;

    # Security hardening
    server_tokens off;

    # Limit request body size to prevent oversized payloads reaching PHP-FPM.
    # GraphQL mutations are text; 10 MB is generous for any JSON payload.
    # File uploads go directly to storage via presigned URLs — not through PHP.
    client_max_body_size 10m;

    # Protect against common web vulnerabilities
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "0" always;
    # CSP: this API returns JSON only; restrict all resource loading.
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    # HSTS: enable only when TLS is terminated upstream (staging/prod). Uncomment then.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }
}
